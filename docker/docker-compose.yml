services:

  # =========================
  # FastAPI App
  # =========================
  fastapi:
    build:
      context: ..
      dockerfile: docker/learnova-cap/Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./env/.env.app
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - fastapi_assets:/app/assets
    

  # =========================
  # MongoDB
  # =========================
  mongodb:
    image: mongo:7.0-jammy
    container_name: mongodb
    ports:
      - "27007:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - ./env/.env.mongodb
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # =========================
  # Qdrant (Vector DB)
  # =========================
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -q -O - http://localhost:6333/readyz || curl -f http://localhost:6333/readyz || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 30s

  # =========================
  # Nginx
  # =========================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================
  # Prometheus
  # =========================
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    user: "root"
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================
  # Grafana
  # =========================
  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - ./env/.env.grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =========================
  # Node Exporter
  # =========================
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - backend
    restart: unless-stopped

  # =========================
  # Mongo Exporter
  # =========================
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter
    ports:
      - "9216:9216"
    env_file:
      - ./env/.env.mongodb-exporter
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

# =========================
# VOLUMES
# =========================
volumes:
  mongo_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  fastapi_assets:

# =========================
# NETWORK
# =========================
networks:
  backend:
    driver: bridge